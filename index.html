<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>बोधिपुरुष</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #e3d5c7;
  --ink: #3f2d22;
  --crimson: #8d2f2f;
  --indigo: #343c7a;
}

*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Tiro Devanagari Hindi", serif;
  background: var(--paper);
  color: var(--ink);
  overflow: hidden;
  opacity: 1;
  transition: opacity 260ms ease;
}

body.page-transition-out { opacity: 0; }

#intro {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: var(--paper);
}

.atm { position: absolute; transition: opacity 1.2s ease; }
.cover-bg { inset: -15%; background: url("book-cover.png") center/cover no-repeat; filter: blur(28px); opacity: .28; transform: scale(1.2); }
.crimson  { width: 500px; height: 900px; left: 18%; top: 10%; background: linear-gradient(180deg,#8d2f2f,#b34a3a,#7a251d); opacity: .35; filter: blur(70px); }
.indigo   { width: 700px; height: 700px; right: -100px; bottom: -50px; border-radius: 50%; background: radial-gradient(circle,#5159a5,#343c7a,#24274f); opacity: .45; filter: blur(80px); }
.earth    { width: 120%; height: 260px; bottom: -80px; left: -10%; background: linear-gradient(180deg,#5f3f2b,#7d573c,#3d291d); opacity: .45; filter: blur(60px); }
.lotus    { width: 300px; height: 300px; left: 50%; top: 30%; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle,#fff,rgba(255,245,220,.95),rgba(255,220,180,.55),transparent 75%); filter: blur(25px); }

#stage-word {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%,-50%) scale(1);
  font-size: clamp(38px,8vw,108px);
  color: #f5ede3;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  will-change: transform, opacity;
  text-shadow:
    1px 1px 3px rgba(42,26,14,.32),
    2px 3px 6px rgba(42,26,14,.22),
    4px 5px 11px rgba(50,32,15,.15),
    7px 8px 18px rgba(58,37,16,.10),
    0 0 30px rgba(210,145,50,.16);
}

.cloud-word {
  position: absolute;
  font-family: "Tiro Devanagari Hindi", serif;
  color: var(--ink);
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  will-change: transform, opacity;
}

@keyframes blast-in {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.72); }
  35%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  65%  { opacity: .65; transform: translate(-50%,-50%) scale(.5); }
  100% { opacity: 1; transform: translate(-50%,-50%) scale(.5); }
}

#cover {
  opacity: 0;
  transform: scale(0.96);
  transition: opacity 700ms ease, transform 700ms ease;
  z-index: 2;
}
#cover.show { opacity: 1; transform: scale(1); }
#cover img {
  width: min(340px, 42vw);
  box-shadow: 0 28px 70px rgba(0,0,0,.28), 0 8px 24px rgba(0,0,0,.15);
}
</style>
</head>
<body>
<div id="intro">
  <div class="atm cover-bg"></div>
  <div class="atm crimson"></div>
  <div class="atm indigo"></div>
  <div class="atm earth"></div>
  <div class="atm lotus"></div>
  <div id="stage-word"></div>
  <div id="cover"><img src="book-cover.png" alt="बोधिपुरुष"></div>
</div>
<script src="assets/js/landing.js" defer></script>
</body>
</html>
